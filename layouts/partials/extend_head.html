<!-- Remember commenter details -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  const nameInput = document.querySelector('input[name="name"]');
  const emailInput = document.querySelector('input[name="email"]');
  
  if (nameInput && emailInput) {
    // Load saved values
    if (localStorage.getItem('commenter_name')) {
      nameInput.value = localStorage.getItem('commenter_name');
    }
    if (localStorage.getItem('commenter_email')) {
      emailInput.value = localStorage.getItem('commenter_email');
    }
    
    // Save on change
    nameInput.addEventListener('blur', function() {
      localStorage.setItem('commenter_name', this.value);
    });
    emailInput.addEventListener('blur', function() {
      localStorage.setItem('commenter_email', this.value);
    });
  }
});
</script>
