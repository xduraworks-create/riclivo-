baseURL = "https://riclivo.online/"
languageCode = "en-us"
title = "Riclivo.online"
theme = "PaperMod"
paginate = 12
enableRobotsTXT = true

[params]
  description = "Your daily source for Tech, AI, Health, Finance, Entertainment, Football & Sports news"
  author = "Riclivo Editorial Team"
  defaultTheme = "light"
  disableThemeToggle = true
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowToc = false
  DateFormat = "January 2, 2006"

  [params.cover]
    linkFullImages = true
    responsiveImages = true

[taxonomies]
  category = "categories"
  tag = "tags"

